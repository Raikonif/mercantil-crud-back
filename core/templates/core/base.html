<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tasks{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #1f2933;
            --muted: #667085;
            --border: #d9dee7;
            --primary: #146c5f;
            --primary-dark: #0f5148;
            --danger: #b42318;
            --danger-dark: #8f1d14;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        main,
        .topbar {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 68px;
        }

        .brand {
            color: var(--text);
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
        }

        main {
            padding: 32px 0 48px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 30px;
            line-height: 1.2;
        }

        h2 {
            margin: 28px 0 14px;
            font-size: 22px;
        }

        a {
            color: var(--primary);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border: 1px solid var(--primary);
            border-radius: 6px;
            padding: 8px 14px;
            background: var(--primary);
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .button:hover,
        button:hover {
            background: var(--primary-dark);
        }

        .button.secondary {
            background: #ffffff;
            color: var(--primary);
        }

        .button.danger,
        button.danger {
            border-color: var(--danger);
            background: var(--danger);
        }

        .button.danger:hover,
        button.danger:hover {
            background: var(--danger-dark);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .task-list,
        .comment-list {
            display: grid;
            gap: 12px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .task-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 2px 9px;
            background: #fafafa;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            background: #ffffff;
            color: var(--text);
            font: inherit;
        }

        textarea {
            resize: vertical;
        }

        .errorlist {
            margin: 6px 0 0;
            padding-left: 18px;
            color: var(--danger);
        }

        .empty {
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .toolbar,
            .task-row {
                align-items: stretch;
                grid-template-columns: 1fr;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 16px 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="topbar">
            <a class="brand" href="{% url 'task-list' %}">Task Manager</a>
            <nav class="actions">
                <a class="button secondary" href="{% url 'task-list' %}">Tasks</a>
                <a class="button" href="{% url 'task-create' %}">New task</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
